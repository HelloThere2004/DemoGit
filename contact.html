<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Workshop - Contact</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f9; color: #333; line-height: 1.6; }
        header { background: #24292e; color: #fff; padding: 2rem; text-align: center; }
        header h1 { font-size: 2.5rem; }
        nav { background: #2f363d; padding: 1rem; text-align: center; }
        nav a { color: #c9d1d9; text-decoration: none; margin: 0 1rem; font-size: 1.1rem; transition: color 0.3s; }
        nav a:hover { color: #58a6ff; }
        main { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: #fff; border-radius: 8px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 1.5rem; }
        .card h2 { color: #24292e; margin-bottom: 1rem; }
        form { display: flex; flex-direction: column; gap: 1rem; }
        label { font-weight: bold; }
        input, textarea { padding: 0.75rem; border: 1px solid #d0d7de; border-radius: 6px; font-size: 1rem; font-family: inherit; }
        input:focus, textarea:focus { outline: none; border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88,166,255,0.3); }
        button { background: #2ea44f; color: #fff; padding: 0.75rem 1.5rem; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #2c974b; }
        .info { background: #fff; border-radius: 8px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .info h2 { color: #24292e; margin-bottom: 0.5rem; }
        footer { text-align: center; padding: 1.5rem; background: #24292e; color: #8b949e; margin-top: 3rem; }
    </style>
</head>
<body>
    <header>
        <h1>📧 Contact Us</h1>
    </header>
    <nav>
        <a href="index.html">🏠 Home</a>
        <a href="about.html">📖 About</a>
        <a href="contact.html">📧 Contact</a>
        <a href="blog.html">📝 Blog</a>
        <a href="gallery.html">🖼️ Gallery</a>
    </nav>
    <main>
        <div class="card">
            <h2>Send a Message</h2>
            <form action="#" method="post">
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>

                <label for="email">Your Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>

                <label for="message">Your Message:</label>
                <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>

                <button type="submit">🚀 Send Message</button>
            </form>
        </div>
        <div class="info">
            <h2>Workshop Facilitator</h2>
            <p><strong>Name:</strong> Git Trainer</p>
            <p><strong>Email:</strong> trainer@gitworkshop.dev</p>
            <p><strong>GitHub:</strong> <a href="https://github.com" target="_blank">github.com</a></p>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 Git Workshop Demo. Built for learning purposes.</p>
    </footer>
</body>
</html>
